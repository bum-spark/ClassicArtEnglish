<nav class="fixed top-0 left-0 w-full z-[9999] transition-all duration-500"
     [class.py-6]="!isScrolled"
     [class.py-3]="isScrolled"
     [class.nav-scrolled]="isScrolled">
  <div class="max-w-7xl mx-auto px-6 md:px-12 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="font-display text-xl md:text-2xl text-ivory tracking-wider hover:text-gold transition-colors duration-300" (click)="closeMenu()">
      Classic Art
    </a>

    <!-- Desktop Nav -->
    <ul class="hidden md:flex items-center gap-8">
      <li>
        <a routerLink="/" routerLinkActive="!text-gold" [routerLinkActiveOptions]="{exact: true}"
           class="text-sm uppercase tracking-[0.2em] text-ivory/70 hover:text-ivory transition-colors duration-300">
          Home
        </a>
      </li>
      <li>
        <a routerLink="/introduction" routerLinkActive="!text-gold"
           class="text-sm uppercase tracking-[0.2em] text-ivory/70 hover:text-ivory transition-colors duration-300">
          Introduction
        </a>
      </li>
      <li>
        <a routerLink="/judith" routerLinkActive="!text-gold"
           class="text-sm uppercase tracking-[0.2em] text-ivory/70 hover:text-ivory transition-colors duration-300">
          Judith
        </a>
      </li>
      <li>
        <a routerLink="/paris" routerLinkActive="!text-gold"
           class="text-sm uppercase tracking-[0.2em] text-ivory/70 hover:text-ivory transition-colors duration-300">
          Paris
        </a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="!text-gold"
           class="text-sm uppercase tracking-[0.2em] text-ivory/70 hover:text-ivory transition-colors duration-300">
          About
        </a>
      </li>
    </ul>

    <!-- Mobile Toggle -->
    <button class="md:hidden flex flex-col gap-1.5 p-2" (click)="toggleMenu()">
      <span class="block w-6 h-[2px] bg-ivory transition-all duration-300"
            [class.rotate-45]="isOpen" [class.translate-y-2]="isOpen"></span>
      <span class="block w-6 h-[2px] bg-ivory transition-all duration-300"
            [class.opacity-0]="isOpen"></span>
      <span class="block w-6 h-[2px] bg-ivory transition-all duration-300"
            [class.-rotate-45]="isOpen" [class.-translate-y-2]="isOpen"></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="md:hidden overflow-hidden transition-all duration-500"
       [class.max-h-0]="!isOpen"
       [class.max-h-96]="isOpen"
       [class.opacity-0]="!isOpen"
       [class.opacity-100]="isOpen">
    <div class="px-6 py-8 flex flex-col gap-6 bg-background/95 backdrop-blur-xl border-t border-white/5">
      <a routerLink="/" routerLinkActive="!text-gold" [routerLinkActiveOptions]="{exact: true}"
         class="text-lg uppercase tracking-[0.15em] text-ivory/70 hover:text-ivory transition-colors"
         (click)="closeMenu()">Home</a>
      <a routerLink="/introduction" routerLinkActive="!text-gold"
         class="text-lg uppercase tracking-[0.15em] text-ivory/70 hover:text-ivory transition-colors"
         (click)="closeMenu()">Introduction</a>
      <a routerLink="/judith" routerLinkActive="!text-gold"
         class="text-lg uppercase tracking-[0.15em] text-ivory/70 hover:text-ivory transition-colors"
         (click)="closeMenu()">Judith</a>
      <a routerLink="/paris" routerLinkActive="!text-gold"
         class="text-lg uppercase tracking-[0.15em] text-ivory/70 hover:text-ivory transition-colors"
         (click)="closeMenu()">Paris</a>
      <a routerLink="/about" routerLinkActive="!text-gold"
         class="text-lg uppercase tracking-[0.15em] text-ivory/70 hover:text-ivory transition-colors"
         (click)="closeMenu()">About</a>
    </div>
  </div>
</nav>
