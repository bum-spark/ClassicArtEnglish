@if (isShowing) {
  <div class="splash-overlay"
       [class.leaving]="isLeaving"
       (click)="dismiss()">

    <!-- Cycling background images -->
    <div class="splash-bg">
      @for (img of currentImages; track img; let i = $index) {
        <img [src]="img"
             alt=""
             class="splash-bg-img"
             [class.visible]="i === activeImageIndex" />
      }
    </div>

    <!-- Fully opaque dark overlay -->
    <div class="splash-darken"></div>

    <!-- Content -->
    <div class="splash-content" [class.leaving]="isLeaving">
      <p class="splash-years">{{ currentYears }}</p>
      <h2 class="splash-title">{{ currentName }}</h2>
      <div class="splash-line"></div>
      <p class="splash-hint">Tap anywhere to continue</p>
    </div>
  </div>
}
